<!DOCTYPE html>
<html lang="hu">
<head>
    <link rel="icon" href="img/m80.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kapcsolat - Modern Design</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<section class="contact-section py-5">
    <div class="container">
        <div class="row mb-5 text-center">
            <div class="col-lg-8 mx-auto">
                <h2 class="display-4 fw-bold">Lépjen velünk kapcsolatba</h2>
                <p class="lead text-muted">Kérdése van? Írjon nekünk, és kollégáink hamarosan válaszolnak.</p>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-5">
                <div class="card border-0 shadow-sm p-4 h-100">
                    <div class="d-flex mb-4">
                        <div class="icon-box me-3">
                            <i class="bi bi-geo-alt-fill fs-4 text-primary"></i>
                        </div>
                        <div>
                            <h5>Címünk</h5>
                            <p class="text-muted">1051 Budapest, Erzsébet tér 1.</p>
                        </div>
                    </div>
                    <div class="d-flex mb-4">
                        <div class="icon-box me-3">
                            <i class="bi bi-envelope-fill fs-4 text-primary"></i>
                        </div>
                        <div>
                            <h5>Email</h5>
                            <p class="text-muted">info@M80.hu</p>
                        </div>
                    </div>
                    
                    <div class="ratio ratio-16x9 mt-auto">
                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2695.55!2d19.05!3d47.5!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zNDfCsDMwJzAwLjAiTiAxOcKwMDMnMDAuMCJF!5e0!3m2!1shu!2shu!4v1620000000000" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                    </div>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="card border-0 shadow-sm p-4">
                    <form>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Teljes név</label>
                                <input type="text" class="form-control" placeholder="Minta Károly" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email cím</label>
                                <input type="email" class="form-control" placeholder="karoly@email.com" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Tárgy</label>
                                <input type="text" class="form-control" placeholder="Miben segíthetünk?">
                            </div>
                            <div class="col-12">
                                <label class="form-label">Üzenet</label>
                                <textarea class="form-control" rows="5" placeholder="Írja le kérdését részletesen..."></textarea>
                            </div>
                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg w-100">Üzenet küldése</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

</body>
</html>
